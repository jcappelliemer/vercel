name: Vercel Prebuilt Prerender

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-prebuilt:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Chromium runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnspr4 libnss3 libatk-bridge2.0-0 libxkbcommon0 \
            libgtk-3-0 libgbm1 libasound2t64 libxss1

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Prebuilt Output (with prerender)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Prebuilt Output
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
